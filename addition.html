<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Addition Fun for Kids</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Comic Sans MS', cursive, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    padding:10px;
}

.container{
    width:100%;
    max-width:550px;
    background:white;
    border-radius:20px;
    padding:15px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

h1{
    font-size:1.5rem;
    color:#ff6b6b;
    margin-bottom:2px;
}

.subtitle{
    font-size:0.9rem;
    color:#666;
    margin-bottom:12px;
}

.score-board{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.score-card{
    flex:1;
    background:#f5f5f5;
    border-radius:12px;
    padding:10px;
}

.score-card h3{
    font-size:0.9rem;
    color:#555;
    margin-bottom:3px;
}

.score-card span{
    font-size:1.5rem;
    font-weight:bold;
    color:#2196f3;
}

.question-box{
    background:#fff4d6;
    border-radius:15px;
    padding:10px;
    margin-bottom:15px;
}

.question{
    font-size:1.5rem;
    font-weight:bold;
    color:#333;
}

input{
    width:100%;
    height:50px;
    border:3px solid #4facfe;
    border-radius:12px;
    text-align:center;
    font-size:1.2rem;
    outline:none;
    margin-bottom:12px;
}

input:focus{
    border-color:#ff6b6b;
}

.btn{
    width:100%;
    height:45px;
    border:none;
    border-radius:12px;
    font-size:1rem;
    font-weight:bold;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.02);
}

.check-btn{
    background:#4CAF50;
}

.next-btn{
    background:#2196F3;
}

.reset-btn{
    background:#ff6b6b;
}

.result{
    min-height:60px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-size:1rem;
    font-weight:bold;
    margin:10px 0;
    padding:5px;
}

.correct{
    color:#4CAF50;
}

.wrong{
    color:#f44336;
}

.star{
    font-size:26px;
}

.bottom-buttons{
    display:flex;
    gap:8px;
}

.bottom-buttons .btn{
    flex:1;
}

@media(max-height:700px){

    h1{
        font-size:1.5rem;
    }

    .question{
        font-size:1.8rem;
    }

    .question-box{
        padding:15px;
    }

    .score-card{
        padding:8px;
    }

    .btn{
        height:40px;
    }

    input{
        height:45px;
    }
}

@media(max-width:600px){

    .container{
        padding:12px;
    }

    .question{
        font-size:1.8rem;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>➕ Addition Fun!</h1>
    <p class="subtitle">Solve sums and become a Math Champion 🏆</p>

    <div class="score-board">

        <div class="score-card">
            <h3>⭐ Score</h3>
            <span id="score">0</span>
        </div>

        <div class="score-card">
            <h3>📚 Question</h3>
            <span id="questionCount">1</span>
        </div>

    </div>

    <div class="question-box">
        <div class="question" id="question">
            5 + 7 = ?
        </div>
    </div>

    <input
        type="number"
        id="answer"
        placeholder="Enter your answer"
    >

    <button
        class="btn check-btn"
        onclick="checkAnswer()">
        ✔ Check Answer
    </button>

    <div class="result" id="result"></div>

    <div class="bottom-buttons">

        <button
            class="btn next-btn"
            onclick="generateQuestion()">
            ➜ Next
        </button>

        <button
            class="btn reset-btn"
            onclick="resetGame()">
            ↺ Reset
        </button>

    </div>

</div>

<script>

let num1;
let num2;
let correctAnswer;

let score = 0;
let questionNumber = 1;

function generateQuestion(){

    num1 = Math.floor(Math.random()*20)+1;
    num2 = Math.floor(Math.random()*20)+1;

    correctAnswer = num1 + num2;

    document.getElementById("question").innerHTML =
        `${num1} + ${num2} = ?`;

    document.getElementById("answer").value = "";

    document.getElementById("result").innerHTML = "";
}

function checkAnswer(){

    const answerBox =
        document.getElementById("answer");

    const result =
        document.getElementById("result");

    if(answerBox.value === ""){

        result.innerHTML =
            "⚠️ Please enter an answer.";

        result.className =
            "result wrong";

        return;
    }

    const userAnswer =
        Number(answerBox.value);

    if(userAnswer === correctAnswer){

        score++;

        document.getElementById("score")
        .textContent = score;

        result.innerHTML =
            "<span class='star'>⭐</span> Great Job! Correct!";

        result.className =
            "result correct";

    }else{

        result.innerHTML =
            `❌ Oops! Correct Answer: ${correctAnswer}`;

        result.className =
            "result wrong";
    }
}

function resetGame(){

    score = 0;
    questionNumber = 1;

    document.getElementById("score")
    .textContent = 0;

    document.getElementById("questionCount")
    .textContent = 1;

    generateQuestion();
}

document
.getElementById("answer")
.addEventListener("keypress",function(e){

    if(e.key === "Enter"){
        checkAnswer();
    }

});

document.querySelector(".next-btn")
.addEventListener("click",function(){

    questionNumber++;

    document.getElementById("questionCount")
    .textContent = questionNumber;

});

generateQuestion();

</script>

</body>
</html>
